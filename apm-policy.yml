name: devexpgbb-org-policy
version: "1.1.0"
# Demo: enforcement flipped to block to show install-time governance teeth.
# Restore to "warn" after the demo (see scripts/restore-policy.sh).
enforcement: block

cache:
  ttl: 3600

dependencies:
  allow:
    - "DevExpGbb/*"
    - "microsoft/*"
    - "github/*"
  deny:
    # Pending SecOps review -- third-party Azure helpers not yet approved
    # for org-wide use. Teams must request exception or pin a vetted fork.
    - "github/awesome-copilot/plugins/azure-cloud-development"
    - "test-blocked/*"
  require_resolution: project-wins

mcp:
  allow:
    - "io.github.github/*"
    - "io.github.modelcontextprotocol/*"
  deny: []
  transport:
    allow: [stdio, http]
  self_defined: warn
  trust_transitive: false

compilation:
  target:
    allow: [vscode, claude, all]
  strategy:
    enforce: distributed
  source_attribution: true

manifest:
  required_fields:
    - version
    - description
  scripts: allow
  content_types:
    allow: [instructions, skill, hybrid, prompts]

unmanaged_files:
  action: warn
  directories: []
